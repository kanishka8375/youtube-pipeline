<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Pipeline Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 14px 28px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-4px);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-date {
            font-size: 0.8rem;
            color: #888;
        }

        .theme-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .status-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
        }

        .status-error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }

        .status-info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196f3;
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-content {
            max-width: 90%;
            max-height: 90%;
        }

        .preview-content video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            width: auto;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Pipeline Studio</h1>
            <p>AI-powered video creation with consistent branding</p>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>Create New Video</h2>
                
                <div class="form-group">
                    <label>Video Topic</label>
                    <textarea id="topic" placeholder="Enter your video topic or script idea..."></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Duration (seconds)</label>
                        <select id="duration">
                            <option value="30">30s</option>
                            <option value="45">45s</option>
                            <option value="60" selected>60s</option>
                            <option value="90">90s</option>
                            <option value="120">120s</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Style</label>
                        <select id="style">
                            <option value="educational">Educational</option>
                            <option value="entertaining">Entertaining</option>
                            <option value="professional">Professional</option>
                            <option value="casual">Casual</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Visual Theme (Consistent Across All Scenes)</label>
                    <div class="theme-options">
                        <button class="theme-btn active" data-theme="modern">Modern Dark</button>
                        <button class="theme-btn" data-theme="minimal">Minimal</button>
                        <button class="theme-btn" data-theme="vibrant">Vibrant</button>
                        <button class="theme-btn" data-theme="corporate">Corporate</button>
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="music" checked style="width: auto;">
                        <span>AI-Generated Background Music (Free Model)</span>
                    </label>
                </div>

                <div class="row" id="musicOptions">
                    <div class="form-group">
                        <label>Music Genre</label>
                        <select id="musicGenre">
                            <option value="ambient">Ambient</option>
                            <option value="electronic">Electronic</option>
                            <option value="cinematic">Cinematic</option>
                            <option value="lofi">Lo-Fi</option>
                            <option value="piano">Piano</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Music Mood</label>
                        <select id="musicMood">
                            <option value="calm">Calm</option>
                            <option value="upbeat">Upbeat</option>
                            <option value="dark">Dark</option>
                            <option value="epic">Epic</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="images" checked style="width: auto;">
                        <span>AI-Generated Images Per Scene (Free Model)</span>
                    </label>
                </div>

                <!-- Advanced Options -->
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="toggleAdvanced()">
                        <span style="font-size: 0.9rem; color: #667eea;">▼ Advanced Options</span>
                    </label>
                </div>

                <div id="advancedOptions" style="display: none;">
                    <!-- Video Presets -->
                    <div class="form-group">
                        <label>Video Preset</label>
                        <select id="videoPreset" onchange="updateAspectRatio()">
                            <option value="">Custom...</option>
                            <option value="youtube_standard">YouTube Standard (16:9)</option>
                            <option value="youtube_shorts">YouTube Shorts (9:16)</option>
                            <option value="instagram_post">Instagram Post (1:1)</option>
                            <option value="tiktok">TikTok (9:16)</option>
                            <option value="cinematic">Cinematic (21:9)</option>
                            <option value="fast_export">Fast Export (Low Quality)</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label>Aspect Ratio</label>
                            <select id="aspectRatio">
                                <option value="16:9" selected>16:9 (Landscape)</option>
                                <option value="9:16">9:16 (Portrait/Shorts)</option>
                                <option value="1:1">1:1 (Square)</option>
                                <option value="4:3">4:3 (Classic)</option>
                                <option value="21:9">21:9 (Cinematic)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quality</label>
                            <select id="quality">
                                <option value="medium">Medium (Fast)</option>
                                <option value="high" selected>High (Recommended)</option>
                                <option value="ultra">Ultra (Slow)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Effects -->
                    <div class="form-group">
                        <label>Transition Style</label>
                        <select id="transitionType">
                            <option value="fade" selected>Fade (Smooth)</option>
                            <option value="slide">Slide</option>
                            <option value="zoom">Zoom</option>
                            <option value="none">None</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 10px;">
                                <input type="checkbox" id="captions" style="width: auto;">
                                <span>Enable Captions</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 10px;">
                                <input type="checkbox" id="kenBurns" style="width: auto;">
                                <span>Ken Burns Effect</span>
                            </label>
                        </div>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label>Color Grading</label>
                            <select id="colorGrading">
                                <option value="">None</option>
                                <option value="warm">Warm</option>
                                <option value="cool">Cool</option>
                                <option value="vintage">Vintage</option>
                                <option value="dramatic">Dramatic</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Text Animation</label>
                            <select id="textAnimation">
                                <option value="fade" selected>Fade</option>
                                <option value="slide_up">Slide Up</option>
                                <option value="bounce">Bounce</option>
                                <option value="none">None</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>AI Provider</label>
                        <select id="provider">
                            <option value="auto">Auto-detect</option>
                            {% for p in providers %}
                            <option value="{{ p }}">{{ p.title() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button id="generateBtn" onclick="generateVideo()">
                    Generate Video
                </button>

                <div class="progress-section" id="progressSection" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText">Initializing...</div>
                </div>

                <div id="statusMessage"></div>

                <!-- Batch Processing Section -->
                <div class="form-group" style="margin-top: 30px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="toggleBatch()">
                        <span style="font-size: 0.9rem; color: #667eea;">▼ Batch Processing</span>
                    </label>
                </div>

                <div id="batchSection" style="display: none;">
                    <div class="form-group">
                        <label>Video Topics (one per line)</label>
                        <textarea id="batchTopics" rows="5" placeholder="Enter multiple topics, one per line...
Example:
History of Coffee
Space Exploration
Ocean Life
Ancient Egypt" style="font-size: 0.9rem;"></textarea>
                    </div>
                    <button id="batchBtn" onclick="generateBatch()" style="background: linear-gradient(90deg, #764ba2 0%, #667eea 100%);">
                        Generate Batch (Multiple Videos)
                    </button>
                    <div id="batchStatus"></div>
                </div>
            </div>

            <div class="card">
                <h2>Generated Videos</h2>
                <div class="video-grid" id="videoGrid">
                    <p style="color: #888; text-align: center; padding: 40px;">
                        No videos yet. Create your first video!
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="preview-modal" id="previewModal">
        <button class="close-btn" onclick="closePreview()">&times;</button>
        <div class="preview-content">
            <video id="previewVideo" controls></video>
        </div>
    </div>

    <script>
        let selectedTheme = 'modern';
        let currentJobId = null;

        // Theme selection
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTheme = btn.dataset.theme;
            });
        });

        // Music toggle
        document.getElementById('music').addEventListener('change', (e) => {
            document.getElementById('musicOptions').style.opacity = e.target.checked ? '1' : '0.5';
            document.getElementById('musicGenre').disabled = !e.target.checked;
            document.getElementById('musicMood').disabled = !e.target.checked;
        });

        // Toggle advanced options
        function toggleAdvanced() {
            const adv = document.getElementById('advancedOptions');
            const label = document.querySelector('[onclick="toggleAdvanced()"] span');
            if (adv.style.display === 'none') {
                adv.style.display = 'block';
                label.textContent = '▼ Advanced Options';
            } else {
                adv.style.display = 'none';
                label.textContent = '▶ Advanced Options';
            }
        }

        // Update aspect ratio when preset changes
        function updateAspectRatio() {
            const preset = document.getElementById('videoPreset').value;
            const arMap = {
                'youtube_standard': '16:9',
                'youtube_shorts': '9:16',
                'instagram_post': '1:1',
                'tiktok': '9:16',
                'cinematic': '21:9',
                'fast_export': '16:9'
            };
            if (arMap[preset]) {
                document.getElementById('aspectRatio').value = arMap[preset];
            }
        }

        async function generateVideo() {
            const topic = document.getElementById('topic').value;
            const duration = document.getElementById('duration').value;
            const style = document.getElementById('style').value;
            const provider = document.getElementById('provider').value;
            const music = document.getElementById('music').checked;
            const music_genre = document.getElementById('musicGenre').value;
            const music_mood = document.getElementById('musicMood').value;
            const images = document.getElementById('images').checked;
            
            // Advanced options
            const videoPreset = document.getElementById('videoPreset').value;
            const aspectRatio = document.getElementById('aspectRatio').value;
            const quality = document.getElementById('quality').value;
            const transitionType = document.getElementById('transitionType').value;
            const captions = document.getElementById('captions').checked;
            const kenBurns = document.getElementById('kenBurns').checked;
            const colorGrading = document.getElementById('colorGrading').value;
            const textAnimation = document.getElementById('textAnimation').value;

            if (!topic) {
                showStatus('Please enter a topic', 'error');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('statusMessage').innerHTML = '';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        topic, duration, style, provider, theme: selectedTheme,
                        music, music_genre, music_mood, images,
                        video_preset: videoPreset,
                        aspect_ratio: aspectRatio,
                        quality,
                        transition_type: transitionType,
                        captions,
                        ken_burns: kenBurns,
                        color_grading: colorGrading,
                        text_animation: textAnimation
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus(data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Generate Video';
                    return;
                }

                currentJobId = data.job_id;
                pollJobStatus();

            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Generate Video';
            }
        }

        // Toggle batch section
        function toggleBatch() {
            const batch = document.getElementById('batchSection');
            const label = document.querySelector('[onclick="toggleBatch()"] span');
            if (batch.style.display === 'none') {
                batch.style.display = 'block';
                label.textContent = '▼ Batch Processing';
            } else {
                batch.style.display = 'none';
                label.textContent = '▶ Batch Processing';
            }
        }

        async function generateBatch() {
            const topicsText = document.getElementById('batchTopics').value.trim();
            if (!topicsText) {
                showStatus('Please enter at least one topic', 'error');
                return;
            }

            const topics = topicsText.split('\n').filter(t => t.trim());
            if (topics.length === 0) {
                showStatus('Please enter valid topics', 'error');
                return;
            }

            const btn = document.getElementById('batchBtn');
            btn.disabled = true;
            btn.textContent = `Processing ${topics.length} videos...`;

            // Get current settings for all videos
            const videoConfig = {
                duration: document.getElementById('duration').value,
                style: document.getElementById('style').value,
                provider: document.getElementById('provider').value,
                theme: selectedTheme,
                music: document.getElementById('music').checked,
                music_genre: document.getElementById('musicGenre').value,
                music_mood: document.getElementById('musicMood').value,
                images: document.getElementById('images').checked,
                video_preset: document.getElementById('videoPreset').value,
                aspect_ratio: document.getElementById('aspectRatio').value,
                quality: document.getElementById('quality').value,
                transition_type: document.getElementById('transitionType').value,
                captions: document.getElementById('captions').checked,
                ken_burns: document.getElementById('kenBurns').checked,
                color_grading: document.getElementById('colorGrading').value,
                text_animation: document.getElementById('textAnimation').value
            };

            // Create batch jobs
            const videos = topics.map(topic => ({
                topic: topic.trim(),
                ...videoConfig
            }));

            try {
                const response = await fetch('/api/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videos })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus(data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Generate Batch (Multiple Videos)';
                    return;
                }

                // Poll batch status
                pollBatchStatus(data.batch_id, topics.length);

            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Generate Batch (Multiple Videos)';
            }
        }

        async function pollBatchStatus(batchId, total) {
            const btn = document.getElementById('batchBtn');
            const statusDiv = document.getElementById('batchStatus');

            try {
                const response = await fetch(`/api/batch/${batchId}`);
                const data = await response.json();

                if (data.status === 'complete') {
                    statusDiv.innerHTML = `<div class="status-message status-success">Batch complete! ${data.completed}/${total} videos generated successfully.</div>`;
                    btn.disabled = false;
                    btn.textContent = 'Generate Batch (Multiple Videos)';
                    loadVideos();
                } else if (data.status === 'error') {
                    statusDiv.innerHTML = `<div class="status-message status-error">Batch failed: ${data.error}</div>`;
                    btn.disabled = false;
                    btn.textContent = 'Generate Batch (Multiple Videos)';
                } else {
                    // Still running
                    const progress = Math.round(((data.completed + data.failed) / total) * 100);
                    statusDiv.innerHTML = `<div class="progress-section"><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div><div class="progress-text">Processing: ${data.completed}/${total} complete, ${data.failed} failed</div></div>`;
                    setTimeout(() => pollBatchStatus(batchId, total), 3000);
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status-message status-error">Error checking batch status</div>`;
                btn.disabled = false;
                btn.textContent = 'Generate Batch (Multiple Videos)';
            }
        }

        async function pollJobStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/api/job/${currentJobId}`);
                const data = await response.json();

                if (data.status === 'complete') {
                    updateProgress(100);
                    document.getElementById('progressText').textContent = 'Complete!';
                    showStatus('Video generated successfully!', 'success');
                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').textContent = 'Generate Video';
                    loadVideos();
                } else if (data.status === 'error') {
                    document.getElementById('progressText').textContent = 'Error';
                    showStatus('Error: ' + data.error, 'error');
                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').textContent = 'Generate Video';
                } else {
                    // Still running
                    const progress = data.progress || 30;
                    updateProgress(progress);
                    document.getElementById('progressText').textContent = data.status || 'Processing...';
                    setTimeout(pollJobStatus, 2000);
                }
            } catch (error) {
                showStatus('Error checking status: ' + error.message, 'error');
            }
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function showStatus(message, type) {
            const div = document.getElementById('statusMessage');
            div.className = 'status-message status-' + type;
            div.textContent = message;
        }

        async function loadVideos() {
            try {
                const response = await fetch('/api/videos');
                const videos = await response.json();

                const grid = document.getElementById('videoGrid');
                
                if (videos.length === 0) {
                    grid.innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">No videos yet. Create your first video!</p>';
                    return;
                }

                grid.innerHTML = videos.map(v => `
                    <div class="video-card" onclick="previewVideo('${v.name}')">
                        <div class="video-thumb">▶</div>
                        <div class="video-info">
                            <div class="video-title">${v.name}</div>
                            <div class="video-date">${new Date(v.created * 1000).toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading videos:', error);
            }
        }

        function previewVideo(filename) {
            const modal = document.getElementById('previewModal');
            const video = document.getElementById('previewVideo');
            video.src = `/api/videos/${filename}`;
            modal.classList.add('active');
            video.play();
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            const video = document.getElementById('previewVideo');
            video.pause();
            video.src = '';
            modal.classList.remove('active');
        }

        // Load videos on page load
        loadVideos();
    </script>
</body>
</html>
