[DEFAULTS]
# Default settings for video generation
topic = Technology Explained
duration = 60
style = educational
privacy = private

[LLM]
# LLM provider: ollama, groq, gemini, or auto (auto-detect)
provider = auto

# Provider-specific settings
ollama_model = llama3.2
groq_model = llama-3.3-70b
gemini_model = flash

[PATHS]
# Directory paths
output_dir = output
temp_dir = temp
assets_dir = assets

[UPLOAD]
# YouTube upload settings
# Set to true to auto-upload
auto_upload = false
# Category ID: 22=People & Blogs, 1=Film & Animation, etc.
category_id = 22

[VOICE]
# TTS voice settings
# Options: en-US-AriaNeural, en-US-GuyNeural, en-GB-SoniaNeural, etc.
voice = en-US-AriaNeural
speed = 1.0

[VIDEO]
# Video settings
width = 1920
height = 1080
fps = 30
bg_color = #1a1a2e
text_color = #ffffff
