<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
      font-size: 14px;
      text-transform: uppercase;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .checkbox-group {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .progress {
      display: none;
      margin-top: 30px;
    }

    .progress.active {
      display: block;
    }

    .progress-bar {
      height: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: width 0.5s;
      width: 0%;
    }

    .terminal {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 13px;
      min-height: 200px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }

    .videos-section h2 {
      color: white;
      margin-bottom: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .video-name {
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .video-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
    }

    .btn-small {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    .result.success {
      background: #d4edda;
      color: #155724;
    }

    .result.error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Video Generator</h1>
    <p class="subtitle">AI-powered video creation with Tauri</p>

    <div class="card">
      <form id="form">
        <div class="form-group">
          <label>Video Topic</label>
          <input type="text" id="topic" placeholder="e.g., Space Exploration" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Duration (seconds)</label>
            <input type="number" id="duration" value="60" min="30" max="300">
          </div>
          <div class="form-group">
            <label>Theme</label>
            <select id="theme">
              <option value="modern">Modern</option>
              <option value="minimal">Minimal</option>
              <option value="vibrant">Vibrant</option>
              <option value="corporate">Corporate</option>
              <option value="cinematic">Cinematic</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Style</label>
            <select id="style">
              <option value="educational">Educational</option>
              <option value="entertainment">Entertainment</option>
              <option value="documentary">Documentary</option>
            </select>
          </div>
          <div class="form-group">
            <label>Options</label>
            <div class="checkbox-group">
              <div class="checkbox-item">
                <input type="checkbox" id="music" checked>
                <label for="music">Music</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="images" checked>
                <label for="images">Images</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="upload">
                <label for="upload">Upload</label>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn" id="submitBtn">Generate Video</button>
      </form>

      <div class="progress" id="progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="terminal" id="terminal"></div>
      </div>

      <div id="result"></div>
    </div>

    <div class="videos-section">
      <h2>Generated Videos</h2>
      <div class="video-grid" id="videoGrid"></div>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__;
    const { listen } = window.__TAURI__.event;

    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submitBtn');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const terminal = document.getElementById('terminal');
    const result = document.getElementById('result');

    let isGenerating = false;

    // Listen for output
    listen('output', (event) => {
      const line = document.createElement('div');
      line.textContent = event.payload;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;

      if (event.payload.includes('[1/4]')) progressFill.style.width = '15%';
      else if (event.payload.includes('[2/4]')) progressFill.style.width = '40%';
      else if (event.payload.includes('[3/4]')) progressFill.style.width = '65%';
      else if (event.payload.includes('[4/4]')) progressFill.style.width = '85%';
      else if (event.payload.includes('DONE')) progressFill.style.width = '100%';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isGenerating) return;

      isGenerating = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Generating...';
      progress.classList.add('active');
      terminal.innerHTML = '';
      result.innerHTML = '';
      progressFill.style.width = '5%';

      const data = {
        topic: document.getElementById('topic').value,
        duration: parseInt(document.getElementById('duration').value),
        style: document.getElementById('style').value,
        theme: document.getElementById('theme').value,
        music: document.getElementById('music').checked,
        images: document.getElementById('images').checked,
        upload: document.getElementById('upload').checked
      };

      try {
        await invoke('generate_video', { request: data });
        result.innerHTML = '<div class="result success">Video generated successfully!</div>';
        loadVideos();
      } catch (err) {
        result.innerHTML = `<div class="result error">Error: ${err}</div>`;
      } finally {
        isGenerating = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate Video';
      }
    });

    async function loadVideos() {
      try {
        const videos = await invoke('get_videos');
        const grid = document.getElementById('videoGrid');
        
        if (videos.length === 0) {
          grid.innerHTML = '<p style="color:white">No videos yet</p>';
          return;
        }

        grid.innerHTML = videos.map(v => {
          const size = (v.size / 1024 / 1024).toFixed(1);
          return `
            <div class="video-card">
              <div class="video-name">${v.name}</div>
              <div class="video-meta">${size} MB • ${v.date}</div>
              <button class="btn-small" onclick="openVideo('${v.path}')">Open</button>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error('Failed to load videos:', e);
      }
    }

    async function openVideo(path) {
      await invoke('open_video', { path });
    }

    loadVideos();
  </script>
</body>
</html>
